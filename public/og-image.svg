<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Color swatch row at top -->
  <rect x="0" y="0" width="171" height="8" fill="#ffffff"/>
  <rect x="171" y="0" width="171" height="8" fill="#000000"/>
  <rect x="342" y="0" width="171" height="8" fill="#ef4444"/>
  <rect x="513" y="0" width="171" height="8" fill="#22c55e"/>
  <rect x="684" y="0" width="171" height="8" fill="#3b82f6"/>
  <rect x="855" y="0" width="171" height="8" fill="#eab308"/>
  <rect x="1026" y="0" width="174" height="8" fill="#ec4899"/>

  <!-- Main color circle -->
  <circle cx="600" cy="260" r="140" fill="#f8f8f8" stroke="#e5e5e5" stroke-width="2"/>
  <circle cx="600" cy="260" r="110" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="600" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#111111" text-anchor="middle">WSO</text>

  <!-- Main headline -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#111111" text-anchor="middle">White Screen Online</text>

  <!-- Subheading -->
  <text x="600" y="508" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#666666" text-anchor="middle">Free Full-Screen Color Tools — No Login Required</text>

  <!-- Domain -->
  <text x="600" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#999999" text-anchor="middle">whitescreenonline.app</text>

  <!-- Color swatch row at bottom -->
  <rect x="0" y="622" width="171" height="8" fill="#f97316"/>
  <rect x="171" y="622" width="171" height="8" fill="#a855f7"/>
  <rect x="342" y="622" width="171" height="8" fill="#6b7280"/>
  <rect x="513" y="622" width="171" height="8" fill="#8b5cf6"/>
  <rect x="684" y="622" width="171" height="8" fill="#14b8a6"/>
  <rect x="855" y="622" width="171" height="8" fill="#f43f5e"/>
  <rect x="1026" y="622" width="174" height="8" fill="#0ea5e9"/>
</svg>
